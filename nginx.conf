# Nginx reverse proxy — no domain, IP-only access
# Copy to /etc/nginx/sites-available/diaspo and symlink to sites-enabled

upstream diaspo_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream diaspo_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;   # Matches any hostname / direct IP access

    client_max_body_size 20M;

    # ── API routes ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://diaspo_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # ── WebSocket ───────────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass          http://diaspo_backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Next.js web app (everything else) ───────────────────────────────────────
    location / {
        proxy_pass         http://diaspo_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }
}
